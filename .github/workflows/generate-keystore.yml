name: Generate Keystore
on:
  workflow_dispatch:

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - name: Generate keystore
        run: |
          keytool -genkey -v -keystore humi-release.jks \
            -alias humi -keyalg RSA -keysize 2048 -validity 10000 \
            -dname "CN=HUMI App, OU=Mobile, O=HUMI, L=Italy, S=Italy, C=IT" \
            -storepass Humi2024! -keypass Humi2024!
          base64 -w 0 humi-release.jks > keystore-base64.txt
          echo "Keystore generated successfully"

      - name: Upload keystore files
        uses: actions/upload-artifact@v4
        with:
          name: humi-keystore
          path: |
            humi-release.jks
            keystore-base64.txt
