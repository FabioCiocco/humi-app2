name: Build Android

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Sync Capacitor
        run: npx cap sync android

      - name: Decode keystore
        run: |
          echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 -d > $GITHUB_WORKSPACE/humi-release.jks
          echo "Keystore size: $(wc -c < $GITHUB_WORKSPACE/humi-release.jks) bytes"

      - name: Make gradlew executable
        run: chmod +x android/gradlew

      - name: Build signed release AAB
        run: |
          cd android && ./gradlew bundleRelease \
            -PHUMI_RELEASE_STORE_FILE=$GITHUB_WORKSPACE/humi-release.jks \
            -PHUMI_RELEASE_STORE_PASSWORD="${{ secrets.KEYSTORE_PASSWORD }}" \
            -PHUMI_RELEASE_KEY_ALIAS="${{ secrets.KEY_ALIAS }}" \
            -PHUMI_RELEASE_KEY_PASSWORD="${{ secrets.KEY_PASSWORD }}"

      - name: Upload signed AAB
        uses: actions/upload-artifact@v4
        with:
          name: humi-signed-release
          path: android/app/build/outputs/bundle/release/app-release.aab